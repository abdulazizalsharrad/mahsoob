<title>Mahsoob محسوب</title><style>
:root{--ink:#1b2430;--brand:#2e7d6f;--bg:#fafafa;--card:#fff;--muted:#5a6672}
*{box-sizing:border-box}

table{border-collapse:collapse;width:100%} td,th{border:1px solid #e3e7e5;padding:6px 8px;font-size:.92rem}
section[dir=rtl]{font-family:-apple-system,'Segoe UI',Tahoma,Arial,sans-serif}
footer{text-align:center;color:var(--muted);font-size:.85rem;margin-top:30px}
</style></head>
